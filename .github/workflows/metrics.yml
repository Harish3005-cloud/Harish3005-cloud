name: Metrics
on:
  # Schedule updates (e.g., every day at midnight)
  schedule: [{cron: "0 0 * * *"}]
  # Lines below allow you to manually trigger it from the Actions tab anytime
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Card
        uses: lowlighter/metrics@latest
        with:
          # Your secure token
          token: ${{ secrets.METRICS_TOKEN }}

          # Options based on your exact layout
          user: harish-e  # Change this to your exact GitHub username
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          
          # Language plugin configuration
          plugin_languages: yes
          plugin_languages_ignored: html, css # Optional: skips web styling filler languages if you want
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
